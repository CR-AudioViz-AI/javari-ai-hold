# .github/workflows/autonomy-cron.yml
# Javari AI Autonomy Scheduler — GitHub Actions fallback
# Fixed: removed invalid % operator from if expressions
# Sunday, March 15, 2026

name: Javari Autonomy Scheduler

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Endpoint to trigger'
        required: false
        default: 'all'
        type: choice
        options: [all, loop, pr-workflow, pr-merge, scan]

env:
  JAVARI_BASE: https://javari-ai-git-main-roy-hendersons-projects-1d3d5e94.vercel.app

jobs:
  autonomy-loop:
    name: Autonomy Loop
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.endpoint == 'all' ||
      github.event.inputs.endpoint == 'loop'
    steps:
      - name: Trigger /api/autonomy/loop
        run: |
          echo "Triggering autonomy loop at $(date -u)"
          HTTP=$(curl -s -o /tmp/loop.json -w "%{http_code}" \
            -X GET "${{ env.JAVARI_BASE }}/api/autonomy/loop" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: JavariGHA/1.0" \
            --max-time 25)
          echo "HTTP $HTTP"
          cat /tmp/loop.json | head -c 500 || true
          if [ "$HTTP" -ge 200 ] && [ "$HTTP" -lt 300 ]; then
            echo "SUCCESS: autonomy loop triggered"
          else
            echo "WARNING: loop returned HTTP $HTTP"
          fi

  pr-workflow:
    name: PR Workflow
    runs-on: ubuntu-latest
    timeout-minutes: 4
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.endpoint == 'all' ||
      github.event.inputs.endpoint == 'pr-workflow'
    steps:
      - name: Trigger /api/autonomy/pr-workflow
        run: |
          echo "Triggering pr-workflow at $(date -u)"
          HTTP=$(curl -s -o /tmp/pw.json -w "%{http_code}" \
            -X GET "${{ env.JAVARI_BASE }}/api/autonomy/pr-workflow" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: JavariGHA/1.0" \
            --max-time 55)
          echo "HTTP $HTTP"
          cat /tmp/pw.json | head -c 500 || true

  pr-merge:
    name: PR Merge
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.endpoint == 'all' ||
      github.event.inputs.endpoint == 'pr-merge'
    steps:
      - name: Trigger /api/autonomy/pr-merge
        run: |
          echo "Triggering pr-merge at $(date -u)"
          HTTP=$(curl -s -o /tmp/pm.json -w "%{http_code}" \
            -X GET "${{ env.JAVARI_BASE }}/api/autonomy/pr-merge" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: JavariGHA/1.0" \
            --max-time 25)
          echo "HTTP $HTTP"
          cat /tmp/pm.json | head -c 500 || true

  scanner:
    name: Scanner
    runs-on: ubuntu-latest
    timeout-minutes: 4
    if: >
      github.event_name == 'schedule' ||
      github.event.inputs.endpoint == 'all' ||
      github.event.inputs.endpoint == 'scan'
    steps:
      - name: Trigger /api/autonomy/scan
        run: |
          echo "Triggering scan at $(date -u)"
          HTTP=$(curl -s -o /tmp/sc.json -w "%{http_code}" \
            -X GET "${{ env.JAVARI_BASE }}/api/autonomy/scan" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: JavariGHA/1.0" \
            --max-time 55)
          echo "HTTP $HTTP"
          cat /tmp/sc.json | head -c 500 || true
