# .github/workflows/autonomy-cron.yml
# Javari AI Autonomy Scheduler — GitHub Actions fallback
# Fires endpoints when Vercel crons are disabled or insufficient.
# Saturday, March 14, 2026

name: Javari Autonomy Scheduler

on:
  schedule:
    - cron: '*/2 * * * *'
  workflow_dispatch:
    inputs:
      endpoint:
        description: 'Endpoint'
        required: false
        default: 'all'
        type: choice
        options: [all, loop, pr-workflow, pr-merge, scan]

env:
  JAVARI_BASE: https://javari-ai-git-main-roy-hendersons-projects-1d3d5e94.vercel.app

jobs:
  autonomy-loop:
    name: Autonomy Loop (every 2 min)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Trigger /api/autonomy/loop
        run: |
          echo "Triggering autonomy loop at $(date -u)"
          curl -sf -X GET "${{ env.JAVARI_BASE }}/api/autonomy/loop" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: JavariGHA/1.0" --max-time 25 \
            -o /tmp/loop.json && cat /tmp/loop.json | head -c 300 \
            || echo "Loop returned non-2xx (may be rate limited)"

  pr-workflow:
    name: PR Workflow (every 5th run ≈ 10 min)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.run_number % 5 == 0)
    steps:
      - name: Trigger /api/autonomy/pr-workflow
        run: |
          curl -sf -X GET "${{ env.JAVARI_BASE }}/api/autonomy/pr-workflow" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: JavariGHA/1.0" --max-time 55 \
            -o /tmp/pw.json && cat /tmp/pw.json | head -c 300 \
            || echo "PR-workflow non-2xx"

  pr-merge:
    name: PR Merge (every 3rd run ≈ 6 min)
    runs-on: ubuntu-latest
    timeout-minutes: 3
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.run_number % 3 == 0)
    steps:
      - name: Trigger /api/autonomy/pr-merge
        run: |
          curl -sf -X GET "${{ env.JAVARI_BASE }}/api/autonomy/pr-merge" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: JavariGHA/1.0" --max-time 25 \
            -o /tmp/pm.json && cat /tmp/pm.json | head -c 300 \
            || echo "PR-merge non-2xx"

  scanner:
    name: Scanner (every 5th run ≈ 10 min)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.run_number % 5 == 1)
    steps:
      - name: Trigger /api/autonomy/scan
        run: |
          curl -sf -X GET "${{ env.JAVARI_BASE }}/api/autonomy/scan" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "User-Agent: JavariGHA/1.0" --max-time 55 \
            -o /tmp/sc.json && cat /tmp/sc.json | head -c 300 \
            || echo "Scanner non-2xx"
